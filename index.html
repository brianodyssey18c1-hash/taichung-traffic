<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺中市易肇事路口 - 全域大數據診斷戰情室</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; }
        
        body, html { height: 100%; overflow: hidden; background: #f8fafc; color: #1e293b; }
        #app { display: flex; height: 100vh; width: 100vw; }
        
        #sidebar { width: 400px; background: #ffffff; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; z-index: 10; box-shadow: 4px 0 20px rgba(0,0,0,0.05); }
        
        .header { padding: 20px; background: linear-gradient(135deg, #2563eb, #1d4ed8); border-bottom: 1px solid #1e40af; }
        .header h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; color: #ffffff; }
        .header p { font-size: 12px; color: #bfdbfe; margin-top: 5px; }
        
        #map { flex: 1; height: 100%; background: #f1f5f9; }
        
        .content { padding: 20px; flex: 1; overflow-y: auto; }
        .stat-card { background: #f1f5f9; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        .stat-card h3 { font-size: 13px; color: #64748b; margin-bottom: 5px; font-weight: 600; }
        .stat-card .value { font-size: 26px; font-weight: bold; color: #10b981; }

        #chat-container { height: 350px; background: #ffffff; border-top: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .chat-title { padding: 10px 15px; background: #f8fafc; font-size: 13px; font-weight: bold; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; gap: 8px; color: #2563eb; }
        #chatMessages { flex: 1; padding: 15px; overflow-y: auto; font-size: 13px; display: flex; flex-direction: column; gap: 10px; background: #f8fafc; }
        
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 85%; line-height: 1.4; word-break: break-all; font-size: 13px; }
        .msg.user { background: #2563eb; color: white; align-self: flex-end; }
        .msg.bot { background: #ffffff; color: #334155; align-self: flex-start; border: 1px solid #e2e8f0; }
        
        .chat-input-area { padding: 10px; background: #ffffff; display: flex; gap: 8px; border-top: 1px solid #e2e8f0; }
        #chatInput { flex: 1; background: #f1f5f9; border: 1px solid #cbd5e1; padding: 8px 12px; border-radius: 6px; color: #1e293b; font-size: 13px; }
        #chatInput:focus { outline: none; border-color: #2563eb; background: #ffffff; }
        
        .chat-input-area button { background: #2563eb; border: none; color: white; padding: 0 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s; font-size: 13px; }
        .chat-input-area button:hover { background: #1d4ed8; }
        
        .leaflet-popup-content-wrapper { background: #ffffff !important; color: #1e293b !important; border: 1px solid #e2e8f0; border-radius: 8px; }
        .leaflet-popup-tip { background: #ffffff !important; }
        .leaflet-container a.leaflet-popup-close-button { color: #64748b !important; }
    </style>
</head>
<body>

<div id="app">
    <div id="sidebar">
        <div class="header">
            <h1>臺中市易肇事路口</h1>
            <p>全域大數據診斷戰情室 (GitHub Pages 連線版)</p>
        </div>
        
        <div class="content">
            <div class="stat-card">
                <h3>即時載入車禍數據總筆數</h3>
                <div class="value" id="total-records">載入中...</div>
            </div>
            <div class="stat-card">
                <h3>地圖觀測狀態</h3>
                <div class="value" style="color: #2563eb; font-size: 13px;" id="data-status">正在讀取 CSV 檔案...</div>
            </div>
            <p style="font-size: 12px; color: #64748b; line-height: 1.5;">
                💡 <b>SVG 效能加速版：</b>系統已改用高效能 SVG 繪製 Google Map 水滴型標記，不再載入外部圖片，徹底告別網頁卡死！
            </p>
        </div>

        <div id="chat-container">
            <div class="chat-title">🤖 AI 交通工程決策助理 (純前端優化版)</div>
            <div id="chatMessages">
                <div class="msg bot">您好！我是臺中交通大數據 AI 助理。我已經與您的雲端 Worker 系統連線。請隨時詢問我關於各路口的改善建議！</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="輸入交通問題，如：西屯區車禍主因是什麼？" onkeydown="if(event.keyCode==13) sendMsg()">
                <button onclick="sendMsg()">發送</button>
            </div>
        </div>
    </div>

    <div id="map"></div>
</div>

<script>
    var map;
    var markersLayer = L.layerGroup();

    window.onload = function() {
        map = L.map('map', {
            center: [24.16, 120.65],
            zoom: 12,
            zoomControl: true
        });

        // 質感高明度白底地圖
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);
        
        markersLayer.addTo(map);

        Papa.parse("clean_traffic_accidents_2.csv", {
            download: true,
            header: true,          
            dynamicTyping: true,   
            skipEmptyLines: true,  
            complete: function(results) {
                console.log("CSV 載入成功，數據筆數：", results.data.length);
                document.getElementById("total-records").innerText = results.data.length.toLocaleString() + " 筆";
                document.getElementById("data-status").innerText = "🟢 資料正常，地標渲染完成";
                renderCsvMarkers(results.data);
            },
            error: function(err) {
                console.error("讀取 CSV 檔案失敗:", err);
                document.getElementById("total-records").innerText = "錯誤";
                document.getElementById("data-status").innerText = "❌ 找不到 CSV 檔案";
            }
        });
    };

    // 3. 🎯 SVG 向量水滴渲染（免圖片、超流暢）
    function renderCsvMarkers(data) {
        markersLayer.clearLayers();
        var locationCounts = {};

        data.forEach(function(row) {
            if (row['GPS座標Y'] && row['GPS座標X']) {
                var key = row['GPS座標Y'].toFixed(4) + "," + row['GPS座標X'].toFixed(4);
                if (!locationCounts[key]) {
                    locationCounts[key] = {
                        lat: row['GPS座標Y'],
                        lng: row['GPS座標X'],
                        count: 0,
                        dead: 0,
                        injured: 0,
                        district: row['區'] || "未知區",
                        reasons: {}
                    };
                }
                locationCounts[key].count += 1;
                locationCounts[key].dead += (row['死亡數量'] || 0);
                locationCounts[key].injured += (row['受傷數量'] || 0);
                
                var reason = row['肇事因素主要'] || "未註明";
                locationCounts[key].reasons[reason] = (locationCounts[key].reasons[reason] || 0) + 1;
            }
        });

        // ⚡ 直接渲染所有不限筆數（因為 SVG 非常輕量，幾千個點也完全不會卡）
        Object.keys(locationCounts).forEach(function(key) {
            var loc = locationCounts[key];
            var topReason = "未註明";
            var maxReasonCount = 0;
            for (var r in loc.reasons) {
                if (loc.reasons[r] > maxReasonCount) {
                    maxReasonCount = loc.reasons[r];
                    topReason = r;
                }
            }

            // 🎨 根據有無死亡事故，給予藍色或紅色的 Google Map 水滴標籤
            var pinColor = loc.dead > 0 ? '#ef4444' : '#2563eb';

            // 🛠️ 用 SVG 向量圖打造一個完美、不卡頓的 Google Map 水滴型圖標
            var svgIcon = L.divIcon({
                html: `<svg width="24" height="36" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 0C5.37 0 0 5.37 0 12c0 7.56 12 24 12 24s12-16.44 12-24c0-6.63-5.37-12-12-12zm0 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z" fill="${pinColor}"/>
                        <circle cx="12" cy="12" r="3" fill="#ffffff"/>
                       </svg>`,
                className: '',
                iconSize: [24, 36],
                iconAnchor: [12, 36],
                popupAnchor: [0, -32]
            });

            var marker = L.marker([loc.lat, loc.lng], { icon: svgIcon });

            marker.bindPopup(`
                <div style="font-family: sans-serif; padding: 3px; min-width: 180px;">
                    <h4 style="margin: 0 0 8px 0; color: #2563eb; border-bottom: 1px solid #e2e8f0; padding-bottom: 4px;">📍 易肇事熱點 (${loc.district})</h4>
                    <table style="width: 100%; font-size: 12px; color: #334155; border-collapse: collapse;">
                        <tr><td style="padding: 3px 0;"><b>累積事故：</b></td><td style="text-align: right; color: #2563eb;"><b>${loc.count} 件</b></td></tr>
                        <tr><td style="padding: 3px 0;"><b>死亡人數：</b></td><td style="text-align: right; color: #ef4444;"><b>${loc.dead} 人</b></td></tr>
                        <tr><td style="padding: 3px 0;"><b>受傷人數：</b></td><td style="text-align: right;">${loc.injured} 人</td></tr>
                        <tr><td colspan="2" style="padding: 5px 0 0 0; color: #64748b; font-size: 11px; border-top: 1px solid #e2e8f0; margin-top: 5px;">
                            <b>主要肇因：</b><br><span style="color: #1e293b;">${topReason}</span>
                        </td></tr>
                    </table>
                </div>
            `);

            markersLayer.addLayer(marker);
        });
    }

    async function sendMsg() {
        var input = document.getElementById("chatInput");
        var text = input.value.trim();
        if(!text) return;
        
        var box = document.getElementById("chatMessages");
        box.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;
        
        var botMsgId = "bot-" + Date.now();
        box.innerHTML += `<div class="msg bot" id="${botMsgId}">🤖 正在分析大數據中...</div>`;
        box.scrollTop = box.scrollHeight;
        
        try {
            const workerUrl = 'https://sparkling-mountain-f419.brianodyssey18c1.workers.dev';
            const response = await fetch(workerUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            
            if (!response.ok) throw new Error(`伺服器錯誤: ${response.status}`);
            
            const data = await response.json();
            document.getElementById(botMsgId).innerHTML = data.reply;
        } catch(err) {
            console.error("AI 連線失敗：", err);
            document.getElementById(botMsgId).innerHTML = `❌ <b>連線錯誤：</b> 無法成功呼叫雲端 AI。`;
        }
        box.scrollTop = box.scrollHeight;
    }
</script>

</body>
</html>
