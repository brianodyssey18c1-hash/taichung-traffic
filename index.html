<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺中市全域 1,392 個路口大數據診斷戰情室</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; }
        body, html { height: 100%; overflow: hidden; background: #0b0f19; color: #fff; }
        #app { display: flex; height: 100vh; width: 100vw; }
        #sidebar { width: 400px; background: #111827; border-right: 1px solid #1f2937; display: flex; flex-direction: column; z-index: 10; box-shadow: 4px 0 15px rgba(0,0,0,0.5); }
        .header { padding: 20px; background: linear-gradient(135deg, #1e3a8a, #3b82f6); border-bottom: 1px solid #1e40af; }
        .header h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
        .header p { font-size: 12px; color: #93c5fd; margin-top: 5px; }
        #map-container { flex: 1; position: relative; height: 100%; }
        #map { height: 100%; width: 100%; }
        
        /* 側邊欄控制與統計 */
        .content { padding: 20px; flex: 1; overflow-y: auto; }
        .stat-card { background: #1f2937; padding: 15px; border-radius: 8px; border: 1px solid #374151; margin-bottom: 15px; }
        .stat-card h3 { font-size: 14px; color: #9ca3af; margin-bottom: 5px; }
        .stat-card .value { font-size: 28px; font-weight: bold; color: #10b981; }
        .stat-card .value.alert { color: #ef4444; }

        /* AI 聊天視窗樣式 */
        #chat-container { height: 350px; background: #1f2937; border-top: 1px solid #374151; display: flex; flex-direction: column; }
        .chat-title { padding: 10px 15px; background: #111827; font-size: 14px; font-weight: bold; border-bottom: 1px solid #374151; display: flex; align-items: center; gap: 8px; color: #3b82f6; }
        #chatMessages { flex: 1; padding: 15px; overflow-y: auto; font-size: 13px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 85%; line-height: 1.4; word-break: break-all; }
        .msg.user { background: #3b82f6; color: white; align-self: flex-end; }
        .msg.bot { background: #374151; color: #e5e7eb; align-self: flex-start; border: 1px solid #4b5563; }
        .chat-input-area { padding: 10px; background: #111827; display: flex; gap: 8px; border-top: 1px solid #374151; }
        #chatInput { flex: 1; background: #1f2937; border: 1px solid #4b5563; padding: 8px 12px; border-radius: 6px; color: white; font-size: 13px; }
        #chatInput:focus { outline: none; border-color: #3b82f6; }
        .chat-input-area button { background: #3b82f6; border: none; color: white; padding: 0 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .chat-input-area button:hover { background: #2563eb; }
        
        /* Leaflet Popup 樣式優化 */
        .leaflet-popup-content-wrapper { background: #1f2937 !important; color: #fff !important; border: 1px solid #4b5563; border-radius: 8px; }
        .leaflet-popup-tip { background: #1f2937 !important; }
        .leaflet-container a.leaflet-popup-close-button { color: #9ca3af !important; }
    </style>
</head>
<body>

<div id="app">
    <div id="sidebar">
        <div class="header">
            <h1>臺中市易肇事路口</h1>
            <p>全域大數據診斷戰情室 (GitHub Pages 連線版)</p>
        </div>
        
        <div class="content">
            <div class="stat-card">
                <h3>即時載入車禍數據總筆數</h3>
                <div class="value" id="total-records">載入中...</div>
            </div>
            <div class="stat-card">
                <h3>地圖觀測狀態</h3>
                <div class="value" style="color: #3b82f6; font-size: 14px;" id="data-status">正在讀取 CSV 檔案...</div>
            </div>
            <p style="font-size: 12px; color: #6b7280; line-height: 1.5;">
                💡 <b>提示：</b>本系統已透過雲端即時載入 <code>clean_traffic_accidents_2.csv</code>。地圖上的圓圈越大代表事故次數越多；紅色代表有發生死亡(A1)事故。
            </p>
        </div>

        <div id="chat-container">
            <div class="chat-title">🤖 AI 交通工程決策助理 (Web & LINE 連線)</div>
            <div id="chatMessages">
                <div class="msg bot">您好！我是臺中交通大數據 AI 助理。我已經與您的雲端 Worker 和 LINE 機器人同步連線。請隨時詢問我關於各路口的改善建議！</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="輸入交通問題，如：西屯區車禍主因是什麼？" onkeydown="if(event.keyCode==13) sendMsg()">
                <button onclick="sendMsg()">發送</button>
            </div>
        </div>
    </div>

    <div id="map-container">
        <div id="map"></div>
    </div>
</div>

<script>
    var map;
    var markersLayer = L.layerGroup();

    // 網頁開啟時自動執行
    window.onload = function() {
        // 1. 初始化地圖 (設定中心點在台中市區)
        map = L.map('map', {
            center: [24.16, 120.65],
            zoom: 12,
            zoomControl: true
        });

        // 載入深色科技感底圖
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);
        
        markersLayer.addTo(map);

        // 2. 自動讀取並解析 GitHub 專案同資料夾下的 CSV 檔案
        // 這裡會自動抓取你上傳在同目錄下的檔案
        Papa.parse("clean_traffic_accidents_2.csv", {
            download: true,
            header: true,          
            dynamicTyping: true,   
            skipEmptyLines: true,  
            complete: function(results) {
                console.log("CSV 載入成功，數據筆數：", results.data.length);
                document.getElementById("total-records").innerText = results.data.length.toLocaleString() + " 筆";
                document.getElementById("data-status").innerText = "🟢 資料連線正常，已渲染至地圖";
                renderCsvMarkers(results.data);
            },
            error: function(err) {
                console.error("讀取 CSV 檔案失敗:", err);
                document.getElementById("total-records").innerText = "錯誤";
                document.getElementById("data-status").innerText = "❌ 找不到 CSV 檔案，請確認檔名是否為 clean_traffic_accidents_2.csv";
            }
        });
    };

    // 3. 將 CSV 數據轉換並繪製地圖標記
    function renderCsvMarkers(data) {
        markersLayer.clearLayers();
        var locationCounts = {};

        data.forEach(function(row) {
            if (row['GPS座標Y'] && row['GPS座標X']) {
                var key = row['GPS座標Y'].toFixed(4) + "," + row['GPS座標X'].toFixed(4);
                if (!locationCounts[key]) {
                    locationCounts[key] = {
                        lat: row['GPS座標Y'],
                        lng: row['GPS座標X'],
                        count: 0,
                        dead: 0,
                        injured: 0,
                        district: row['區'] || "未知區",
                        reasons: {}
                    };
                }
                locationCounts[key].count += 1;
                locationCounts[key].dead += (row['死亡數量'] || 0);
                locationCounts[key].injured += (row['受傷數量'] || 0);
                
                var reason = row['肇事因素主要'] || "未註明";
                locationCounts[key].reasons[reason] = (locationCounts[key].reasons[reason] || 0) + 1;
            }
        });

        Object.keys(locationCounts).forEach(function(key) {
            var loc = locationCounts[key];
            var topReason = "未註明";
            var maxReasonCount = 0;
            for (var r in loc.reasons) {
                if (loc.reasons[r] > maxReasonCount) {
                    maxReasonCount = loc.reasons[r];
                    topReason = r;
                }
            }

            var markerColor = loc.dead > 0 ? '#ef4444' : '#f59e0b';
            var radiusSize = Math.min(5 + (loc.count * 0.3), 25);

            var circle = L.circleMarker([loc.lat, loc.lng], {
                radius: radiusSize,
                color: markerColor,
                fillColor: markerColor,
                fillOpacity: 0.6,
                weight: 1
            });

            circle.bindPopup(`
                <div style="font-family: sans-serif; padding: 5px; min-width: 180px;">
                    <h4 style="margin: 0 0 8px 0; color: #3b82f6; border-bottom: 1px solid #374151; padding-bottom: 4px;">📍 事故熱點 (${loc.district})</h4>
                    <table style="width: 100%; font-size: 12px; color: #e5e7eb; border-collapse: collapse;">
                        <tr><td style="padding: 3px 0;"><b>累積事故：</b></td><td style="text-align: right; color: #f59e0b;"><b>${loc.count} 件</b></td></tr>
                        <tr><td style="padding: 3px 0;"><b>死亡人數：</b></td><td style="text-align: right; color: #ef4444;">${loc.dead} 人</td></tr>
                        <tr><td style="padding: 3px 0;"><b>受傷人數：</b></td><td style="text-align: right;">${loc.injured} 人</td></tr>
                        <tr><td colspan="2" style="padding: 5px 0 0 0; color: #9ca3af; font-size: 11px; border-top: 1px solid #374151; margin-top: 5px;">
                            <b>主要肇因：</b><br>${topReason}
                        </td></tr>
                    </table>
                </div>
            `);

            markersLayer.addLayer(circle);
        });
    }

    // 4. 前端聊天室呼叫 Cloudflare Worker
    async function sendMsg() {
        var input = document.getElementById("chatInput");
        var text = input.value.trim();
        if(!text) return;
        
        var box = document.getElementById("chatMessages");
        box.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;
        
        var botMsgId = "bot-" + Date.now();
        box.innerHTML += `<div class="msg bot" id="${botMsgId}">🤖 正在分析大數據中...</div>`;
        box.scrollTop = box.scrollHeight;
        
        try {
            // 🔒 自動幫你換上你剛才申請成功的 Cloudflare Workers 網址
            const workerUrl = 'https://eu1.make.com/1863420/scenarios/add';

            const response = await fetch(workerUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ message: text })
            });
            
            if (!response.ok) {
                throw new Error(`伺服器錯誤: ${response.status}`);
            }
            
            const data = await response.json();
            document.getElementById(botMsgId).innerHTML = data.reply;
            
        } catch(err) {
            console.error("AI 連線失敗：", err);
            document.getElementById(botMsgId).innerHTML = `❌ <b>連線錯誤：</b> 無法成功呼叫雲端 AI。請確認 Cloudflare 上的 Worker 狀態正常。`;
        }
        
        box.scrollTop = box.scrollHeight;
    }
</script>

</body>
</html>
